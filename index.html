<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Lab Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<!-- 1. Core: DB, autenticação, roteamento, utilitários -->
<script src="./core/db.js?v=2" defer></script>
<script src="./core/auth.js?v=5" defer></script>
<script src="./core/router.js?v=2" defer></script>
<script src="./core/utils.js?v=2" defer></script>
<!-- 1b. Core ACL — deve vir ANTES de pages/perfis_acesso.js -->
<script src="./core/acl.js?v=1" defer></script>
<!-- 2. Import engines (dependem de core) -->
<script src="./import/import-g5.js" defer></script>
<script src="./import/import-envio.js" defer></script>
<script src="./import/import-esmeralda.js" defer></script>
<!-- 3. Web Components (após utils.js — db-toast e db-modal sobrescrevem window.toast/openModal) -->
<script src="./components/db-sidebar.js" defer></script>
<script src="./components/db-topbar.js" defer></script>
<script src="./components/db-login.js" defer></script>
<script src="./components/db-toast.js" defer></script>
<script src="./components/db-modal.js" defer></script>
<!-- 4. Páginas (dependem de todos os módulos acima) -->
<script src="./pages/dashboard.js" defer></script>
<script src="./pages/laboratorios.js" defer></script>
<script src="./pages/representantes.js" defer></script>
<script src="./pages/assessores.js" defer></script>
<script src="./pages/supervisores.js" defer></script>
<script src="./pages/gerentes.js" defer></script>
<script src="./pages/analistas.js" defer></script>
<script src="./pages/sistemas.js" defer></script>
<script src="./pages/chamados.js" defer></script>
<script src="./pages/importacao.js" defer></script>
<script src="./pages/divergencias.js" defer></script>
<script src="./pages/propostas.js" defer></script>
<script src="./pages/pacotes.js" defer></script>
<script src="./pages/perfis_acesso.js" defer></script>
<script src="./pages/grupos_matrizes.js" defer></script>
<script src="./pages/dashboard_financeiro.js" defer></script>
<script src="./pages/dashboard_comercial.js" defer></script>
<style>
  :root {
    /* 60% — Fundo claro: áreas de conteúdo e leitura */
    --bg:  #f4f6f8;
    --bg2: #ffffff;
    --bg3: #eef1f5;
    --bg4: #e4e8ef;

    /* Bordas e separadores */
    --border:  #d4dbe6;
    --border2: #b8c4d4;

    /* Textos */
    --text:  #1a2433;
    --text2: #4a5568;
    --text3: #8a96a8;

    /* 30% — Azul Marinho Grupo DB: estrutura / sidebar */
    --navy:    #003761;
    --navy2:   #002a4d;
    --navy3:   #004a80;

    /* 8% — Verde-Água: ação / botões / destaques */
    --accent:  #0F9B94;
    --accent2: #0a7a74;

    /* 2% — Dourado: refinamento */
    --gold:    #C49B3C;
    --gold2:   #a8822e;

    /* Semânticas (alerts, status) */
    --green:   #0F9B94;
    --green2:  #0a7a74;
    --amber:   #C49B3C;
    --red:     #d63031;
    --purple:  #6c5ce7;
    --teal:    #00b894;

    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', monospace;
    --r: 6px;
    --r2: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR — estilos movidos para components/db-sidebar.js (Web Component) */

  /* MAIN */
  #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  #content { flex: 1; overflow-y: auto; padding: 28px; background: var(--bg); }

  /* CARDS METRICS */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .metric {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 20px 22px; border-top: 3px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,55,97,.05);
  }
  .metric.accent { border-top-color: var(--accent); }
  .metric.green  { border-top-color: var(--accent); }
  .metric.amber  { border-top-color: var(--gold); }
  .metric.purple { border-top-color: var(--navy3); }
  .metric-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .metric-val { font-size: 28px; font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .metric.accent .metric-val { color: var(--accent); }
  .metric.green .metric-val  { color: var(--accent); }
  .metric.amber .metric-val  { color: var(--gold); }
  .metric.purple .metric-val { color: var(--navy3); }

  /* CHARTS */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  .chart-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 20px; box-shadow: 0 1px 4px rgba(0,55,97,.05);
  }
  .chart-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }

  /* SEARCH & FILTER BAR */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 12px 8px 34px; color: var(--text); font-size: 13px; outline: none; transition: border .15s; box-shadow: 0 1px 2px rgba(0,55,97,.04); }
  .search-wrap.no-icon input { padding-left: 12px; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  select, .filter-select {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
    padding: 8px 10px; color: var(--text); font-size: 13px; outline: none; cursor: pointer; box-shadow: 0 1px 2px rgba(0,55,97,.04);
  }
  select:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent); border: none; border-radius: var(--r); padding: 8px 16px;
    color: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
    box-shadow: 0 2px 4px rgba(15,155,148,.25);
  }
  .btn:hover { background: var(--accent2); box-shadow: 0 3px 8px rgba(15,155,148,.35); transform: translateY(-1px); }
  .btn.secondary { background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); font-weight: 500; box-shadow: none; }
  .btn.secondary:hover { background: var(--bg3); color: var(--navy); transform: none; box-shadow: none; }
  .btn.danger { background: var(--red); box-shadow: 0 2px 4px rgba(214,48,49,.2); }
  .btn.danger:hover { background: #c0392b; box-shadow: 0 3px 8px rgba(214,48,49,.3); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }

  /* TABLE */
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; box-shadow: 0 1px 4px rgba(0,55,97,.05); }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--navy); color: rgba(255,255,255,.75); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 16px; text-align: left; border-bottom: none; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #eef6f6; }
  tbody td { padding: 10px 16px; color: var(--text2); font-size: 13px; }
  tbody td strong { color: var(--text); font-weight: 500; }

  /* BADGE */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge.uf { background: rgba(0,55,97,.1); color: var(--navy); }
  .badge.sys { background: rgba(15,155,148,.12); color: var(--accent2); }
  .badge.rep { background: rgba(15,155,148,.1); color: var(--accent2); }
  .badge.tag { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); margin: 2px; }
  .badge.new { background: rgba(15,155,148,.12); color: var(--accent2); }
  .badge.alt { background: rgba(245,166,35,.12); color: var(--amber); }

  /* CARDS GRID (clientes) */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .lab-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 16px; cursor: pointer; transition: all .15s;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 1px 4px rgba(0,55,97,.05);
  }
  .lab-card:hover { border-color: var(--accent); background: var(--bg2); box-shadow: 0 4px 12px rgba(15,155,148,.12); transform: translateY(-1px); }
  .lab-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .lab-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .lab-code { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
  .lab-card-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .lab-card-row svg { width: 12px; height: 12px; color: var(--text3); flex-shrink: 0; }
  .lab-card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 20px; }
  .page-btn {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 6px 12px;
    color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--navy); border-color: var(--navy); color: white; }
  .page-info { font-size: 12px; color: var(--text3); }

  /* MODAL */
  /* Modal styles moved to components/db-modal.js (Shadow DOM) */
  .field-group { margin-bottom: 18px; }
  .field-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .field-val { font-size: 14px; color: var(--text); padding: 8px 12px; background: var(--bg3); border-radius: var(--r); border: 1px solid var(--border); }
  .field-val.locked { color: var(--text2); font-style: italic; }
  input[type="text"], input[type="tel"], input[type="email"], input[type="number"], textarea {
    width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
    padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; transition: border .15s;
    font-family: var(--font);
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  .section-divider { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--navy3); padding: 16px 0 10px; border-top: 2px solid var(--bg3); margin-top: 6px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .lock-note { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

  /* IMPORT */
  .drop-zone {
    border: 2px dashed var(--border2); border-radius: var(--r2); padding: 48px 24px;
    text-align: center; cursor: pointer; transition: all .15s;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(15,155,148,.04); }
  .drop-zone-icon { font-size: 40px; margin-bottom: 12px; }
  .drop-zone-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .drop-zone-sub { font-size: 13px; color: var(--text3); }
  .progress-bar { width: 100%; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin: 10px 0; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }

  /* LOG REPORT */
  .report-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 20px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,55,97,.05);
  }
  .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .report-title { font-size: 14px; font-weight: 600; }
  .report-date { font-size: 12px; color: var(--text3); }
  .report-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .report-stat { display: flex; align-items: center; gap: 6px; font-size: 13px; }

  /* SISTEMAS */
  .sys-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 18px; display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 1px 4px rgba(0,55,97,.05); transition: box-shadow .15s;
  }
  .sys-card-header { display: flex; justify-content: space-between; }
  .sys-name { font-size: 15px; font-weight: 600; }
  .sys-company { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag-input-wrap { display: flex; gap: 8px; margin-top: 6px; }


  .empty-state { text-align: center; padding: 60px 24px; }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
  .empty-state-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--navy); }
  .empty-state-sub { font-size: 13px; color: var(--text3); }
  .hidden { display: none !important; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

  /* MULTI-SELECT CHECKBOXES (Sistemas modal) */
  .multi-check-group {
    display: flex; flex-direction: column; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r); padding: 10px 12px;
  }
  .multi-check-group label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text2); cursor: pointer;
  }
  .multi-check-group label:hover { color: var(--navy); }
  .multi-check-group input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); }

  /* BADGE VINCULADOS no card de sistema */
  .sys-linked-badge {
    font-size: 11px; color: var(--accent2);
    background: rgba(15,155,148,.1); border-radius: 20px;
    padding: 2px 8px; font-weight: 600; display: inline-block;
  }

  /* CHAMADOS */
  .chamado-item {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r);
    padding: 12px 14px; margin-bottom: 8px; position: relative;
  }
  .chamado-item:last-child { margin-bottom: 0; }
  .chamado-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .chamado-num { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--navy); }
  .chamado-analista { font-size: 11px; color: var(--text2); }
  .chamado-dates { font-size: 11px; color: var(--text3); display: flex; gap: 12px; margin-bottom: 4px; }
  .chamado-status-on   { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(15,155,148,.12); color: var(--accent2); }
  .chamado-status-off  { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(232,88,88,.12); color: var(--red); }
  .chamado-status-impl { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(196,155,60,.13); color: var(--gold); }

  /* ── Sortable column headers ── */
  th[data-sort] { position: relative; padding-right: 20px !important; }
  th[data-sort]::after {
    content: '⇅';
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-size: 10px; opacity: .4; font-weight: 400;
  }
  th[data-sort][data-sort-dir="asc"]::after  { content: '▲'; opacity: .9; color: var(--accent2); }
  th[data-sort][data-sort-dir="desc"]::after { content: '▼'; opacity: .9; color: var(--accent2); }
  .chamado-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; }
  .chamado-del:hover { color: var(--red); }
  .chamado-form { background: var(--bg4); border: 1px dashed var(--border2); border-radius: var(--r); padding: 14px; margin-top: 10px; }
  .chamado-form .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chamado-form .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* MULTI-CONTATO */
  .contato-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r);
    margin-bottom: 6px;
  }
  .contato-item:last-child { margin-bottom: 0; }
  .contato-info { flex: 1; min-width: 0; }
  .contato-nome { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contato-meta { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contato-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0; padding: 0 4px; }
  .contato-del:hover { color: var(--red); }
  .contato-add-form { background: var(--bg4); border: 1px dashed var(--border2); border-radius: var(--r); padding: 12px; margin-top: 8px; }

  /* CHAMADO EDIT INLINE */
  .chamado-item.editing { border-color: var(--accent); background: var(--bg4); }
  .chamado-edit-form { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:none; }
  .chamado-item.editing .chamado-edit-form { display:block; }
  .chamado-edit-btn { background:none; border:1px solid var(--border2); border-radius:var(--r); padding:3px 8px; font-size:11px; color:var(--text2); cursor:pointer; margin-right:4px; }
  .chamado-edit-btn:hover { border-color:var(--navy); color:var(--navy); }
  .chamado-edit-btn.save { background:var(--accent); border-color:var(--accent); color:white; }
  .chamado-edit-btn.save:hover { background:var(--accent2); }

  /* VIEW MODAL info rows */
  .view-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .view-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); min-width:110px; padding-top:1px; }
  .view-val { font-size:13px; color:var(--text); flex:1; }

  /* DIVERGENCIAS */
  .div-section { margin-bottom: 28px; }
  .div-section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 10px 14px; border-radius: var(--r) var(--r) 0 0; margin-bottom: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .div-section-title.red   { background: rgba(232,88,88,.12); color: var(--red); border: 1px solid rgba(232,88,88,.25); }
  .div-section-title.amber { background: rgba(245,166,35,.10); color: var(--amber); border: 1px solid rgba(245,166,35,.2); }
  .div-section-title.purple{ background: rgba(155,115,248,.10); color: var(--purple); border: 1px solid rgba(155,115,248,.2); }
  .div-section-title.teal  { background: rgba(38,198,218,.10); color: var(--teal); border: 1px solid rgba(38,198,218,.2); }
  .div-table-wrap { border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r) var(--r); overflow-x: auto; max-width: 100%; }
  .div-badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .div-badge.int  { background: rgba(0,55,97,.1); color: var(--navy); }
  .div-badge.conv { background: rgba(15,155,148,.12); color: var(--accent2); }
  .div-badge.ws   { background: rgba(155,115,248,.12); color: var(--purple); }
  .div-badge.noint{ background: rgba(214,48,49,.1);  color: var(--red); }
  .div-badge.mens { background: rgba(245,166,35,.12); color: var(--amber); }
  .envio-chip { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin: 1px; background: var(--bg4); color: var(--text2); }
  .import-tab { display:inline-block; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; border-radius:var(--r) var(--r) 0 0; border:1px solid var(--border); border-bottom:none; margin-right:4px; color:var(--text2); background:var(--bg3); }

  /* INTEGRATION STATUS BADGES */
  .int-status { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .int-status.none     { background:rgba(0,55,97,.08);   color:var(--navy3); }
  .int-status.inactive { background:rgba(214,48,49,.1);  color:var(--red); }
  .int-status.active   { background:rgba(15,155,148,.12); color:var(--accent2); }
  .int-status.impl     { background:rgba(196,155,60,.12); color:var(--gold2); }
  .int-status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .int-status.none .int-status-dot     { background:var(--navy3); }
  .int-status.inactive .int-status-dot { background:var(--red); }
  .int-status.active .int-status-dot   { background:var(--accent); }
  .int-status.impl .int-status-dot     { background:var(--gold); }

  /* ACCORDION */
  .accordion-section { margin-bottom: 14px; border-radius: var(--r2); overflow:hidden; box-shadow: 0 1px 4px rgba(0,55,97,.06); }
  .accordion-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 16px; cursor:pointer; user-select:none; transition: background .15s;
    border-radius: var(--r2);
  }
  .accordion-header.collapsed { border-radius: var(--r2); }
  .accordion-header:not(.collapsed) { border-radius: var(--r2) var(--r2) 0 0; }
  .accordion-header .acc-title { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  .accordion-chevron { font-size:14px; transition:transform .2s; }

  .accordion-body { display:none; }

  /* PROPOSTAS PAGE */
  .proposta-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2);
    padding:16px; box-shadow:0 1px 4px rgba(0,55,97,.05); margin-bottom:10px;

  .prop-status { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:700; }

  .prop-status.paga      { background:rgba(0,55,97,.1); color:var(--navy); }
  .prop-status.cancelada { background:rgba(214,48,49,.1); color:var(--red); }

  /* PACOTES PAGE */
  .pacote-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2);
    padding:0; box-shadow:0 1px 4px rgba(0,55,97,.05); overflow:hidden; margin-bottom:12px;
  }
  .pacote-header {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 18px; background:var(--navy); color:white;
  }
  .pacote-nome { font-size:14px; font-weight:700; }
  .pacote-meta { font-size:12px; color:rgba(255,255,255,.6); }
  .pacote-body { padding:14px 18px; }

  /* ENVIO CHIPS em cards de lab */
  .lab-envio-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
  .lab-envio-chip { display:inline-flex; align-items:center; gap:3px; padding:1px 7px; border-radius:3px; font-size:10px; font-weight:600; background:var(--bg3); border:1px solid var(--border); color:var(--text2); }
  .lab-envio-chip .chip-qty { color:var(--navy); font-weight:700; margin-left:3px; }

  /* REPORT BUTTON */
  .btn-report { background:var(--gold); border:none; border-radius:var(--r); padding:7px 14px;
    color:white; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center;
    gap:6px; box-shadow:0 2px 6px rgba(196,155,60,.3); transition:all .15s; }
  .btn-report:hover { background:var(--gold2); transform:translateY(-1px); box-shadow:0 4px 10px rgba(196,155,60,.4); }

  /* GRUPO/MATRIZ PAGE */
  .gm-type-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
  .gm-type-badge.grupo  { background:rgba(0,55,97,.1); color:var(--navy); }
  .gm-type-badge.matriz { background:rgba(15,155,148,.1); color:var(--accent2); }
  .gm-type-badge.filial { background:rgba(196,155,60,.1); color:var(--gold2); }

  /* DYNAMIC CHART PANELS */
  .dyn-chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .dyn-chart-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 16px; box-shadow: 0 1px 4px rgba(0,55,97,.05);
  }
  .dyn-chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .dyn-chart-select {
    font-size: 11px; padding: 4px 8px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r); color: var(--navy); font-weight: 600; cursor: pointer; outline: none;
  }
  .dyn-chart-select:focus { border-color: var(--accent); }
  .dyn-chart-wrap { position: relative; height: 200px; }

  /* BUDGET UI */
  .budget-bar-wrap { background: var(--bg3); border-radius: 6px; overflow: hidden; height: 12px; margin: 6px 0 10px; }
  .budget-bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
  .budget-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,55,97,.05);
  }
  .budget-set-form { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ACL — Perfis de Acesso */
  .acl-grid { display: grid; grid-template-columns: 260px 1fr; gap: 16px; align-items: start; }
  .acl-sidebar { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; box-shadow: 0 1px 4px rgba(0,55,97,.05); }
  .acl-sidebar-header { background: var(--navy); color: white; padding: 12px 16px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .acl-perfil-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
  .acl-perfil-item:last-child { border-bottom: none; }
  .acl-perfil-item:hover { background: var(--bg3); }
  .acl-perfil-item.selected { background: rgba(15,155,148,.08); border-left: 3px solid var(--accent); }
  .acl-perfil-nome { font-size: 13px; font-weight: 600; color: var(--navy); }
  .acl-perfil-tipo { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .acl-full-badge { font-size: 9px; font-weight: 700; background: rgba(15,155,148,.12); color: var(--accent2); padding: 2px 7px; border-radius: 20px; }

  .acl-matrix { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; box-shadow: 0 1px 4px rgba(0,55,97,.05); }
  .acl-matrix-header { background: var(--navy); color: white; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
  .acl-matrix-title { font-size: 14px; font-weight: 700; }
  .acl-matrix-sub { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px; }
  .acl-category { border-bottom: 1px solid var(--border); }
  .acl-category:last-child { border-bottom: none; }
  .acl-cat-header { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: var(--bg3); border-bottom: 1px solid var(--border); }
  .acl-cat-label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--navy3); flex: 1; }
  .acl-toggle { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
  .acl-toggle input { opacity: 0; width: 0; height: 0; }
  .acl-toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--border2); border-radius: 20px; transition: .2s; }
  .acl-toggle-slider:before { position: absolute; content: ''; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
  .acl-toggle input:checked + .acl-toggle-slider { background: var(--accent); }
  .acl-toggle input:checked + .acl-toggle-slider:before { transform: translateX(16px); }
  .acl-toggle input:disabled + .acl-toggle-slider { opacity: .5; cursor: not-allowed; }
  .acl-page-row { display: flex; align-items: center; padding: 9px 18px 9px 36px; border-bottom: 1px solid var(--border); }
  .acl-page-row:last-child { border-bottom: none; }
  .acl-page-label { flex: 1; font-size: 13px; color: var(--text2); }
  .acl-page-label small { font-size: 10px; color: var(--text3); margin-left: 6px; }
  .acl-btn-row { display: flex; align-items: center; gap: 8px; padding: 6px 18px 6px 54px; background: var(--bg3); border-bottom: 1px solid var(--border); }
  .acl-btn-label { font-size: 11px; color: var(--text3); flex: 1; }
  .acl-full-overlay { position: absolute; inset: 0; background: rgba(15,155,148,.04); border: 2px solid rgba(15,155,148,.2); border-radius: var(--r2); pointer-events: none; }

  .acl-user-section { margin-top: 16px; }
  .acl-user-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,55,97,.04); }
  .acl-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--navy); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .acl-user-info { flex: 1; min-width: 0; }
  .acl-user-nome { font-size: 13px; font-weight: 600; color: var(--navy); }
  .acl-user-perfil { font-size: 11px; color: var(--text3); }

  /* SIDEBAR USER PILL — movido para components/db-sidebar.js */

  /* AUDIT LOG */
  .audit-row { display: grid; grid-template-columns: 140px 80px 1fr 100px; gap: 8px; padding: 7px 14px;
    border-bottom: 1px solid var(--border); font-size: 11px; align-items: center; }
  .audit-row:hover { background: var(--bg3); }
  .audit-action-badge { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .audit-action-badge.create { background: rgba(15,155,148,.12); color: var(--accent2); }
  .audit-action-badge.edit   { background: rgba(196,155,60,.12); color: var(--gold2); }
  .audit-action-badge.delete { background: rgba(214,48,49,.1); color: var(--red); }
  .audit-action-badge.import { background: rgba(0,55,97,.1); color: var(--navy3); }
  .audit-action-badge.login  { background: rgba(108,92,231,.1); color: #6c5ce7; }
</style>
</head>
<body>

<db-login id="login"></db-login>

<!-- SIDEBAR -->
<db-sidebar id="sidebar"></db-sidebar>

<!-- MAIN -->
<main id="main">
  <db-topbar id="topbar" title="Dashboard" subtitle="Visão geral da plataforma"></db-topbar>
  <div id="rls-global-banner" style="padding:0 0 2px 0"></div>
  <div id="content"></div>
</main>

<!-- MODAL -->
<db-modal id="modal"></db-modal>
<!-- TOAST -->
<db-toast id="toast"></db-toast>

<script>
// ── FASE 5 — Script inline mínimo ──────────────────────────────────────────
// Todo o código de aplicação foi extraído para módulos:
//   ACL_STRUCTURE, PERFIS_DEFAULT, buildDefaultPerms  → core/acl.js
//   openUserModal                                      → pages/perfis_acesso.js
//   pages.perfis_acesso                                → pages/perfis_acesso.js
//
// Este inline mantém apenas:
//   1. var pages / var currentPage — bridging para que o parser não lance
//      ReferenceError antes dos defer executarem (router.js reutiliza window.pages)
//   2. toggleAcc — proxy fino para window._divToggleAcc (divergencias.js)
//   3. Boot em DOMContentLoaded — sequência de inicialização da aplicação

var pages = {};
var currentPage = '';

// Proxy para toggleAcc usado via onclick no HTML de divergências
window.toggleAcc = function(key) {
  if (window._divToggleAcc) window._divToggleAcc(key);
};

// ── BOOT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('main').style.display    = 'none';
  document.getElementById('sidebar').style.display = 'none';

  document.addEventListener('db-login-submit', function () {
    var loginComp = document.getElementById('login');
    var credentials = { login: '', password: '' };
    if (loginComp && typeof loginComp.getCredentials === 'function') {
      credentials = loginComp.getCredentials();
    }

    var login = credentials.login || '';
    var password = credentials.password || '';
    var loginFn = window.doLogin || (window.parent && window.parent.doLogin);

    if (typeof loginFn !== 'function') {
      console.error('doLogin não encontrado em window. Verifique core/auth.js.');
      if (loginComp && typeof loginComp.setError === 'function') {
        loginComp.setError('Erro interno. Recarregue a página.');
      }
      return;
    }

    Promise.resolve(loginFn(login, password)).then(function (success) {
      if (success && loginComp && typeof loginComp.reset === 'function') {
        loginComp.reset();
      }
    }).catch(function (err) {
      console.error('Erro no processo de login:', err);
      if (loginComp && typeof loginComp.setError === 'function') {
        loginComp.setError('Erro ao conectar ao banco de dados.');
      }
    });
  });

  document.addEventListener('db-navigate', function (e) {
    var page = e.detail.page;
    if (!canAccess(page)) { toast('Sem permissão para acessar esta página.', 'error'); return; }
    navigate(page);
  });

  document.addEventListener('db-logout', function () {
    if (confirm('Deseja encerrar a sessão?')) doLogout();
  });

  var dbInitPromise = initDB();
  window.dbReady = dbInitPromise;

  dbInitPromise.then(async function () {
    var initAdmin = window.initDefaultAdmin;
    if (typeof initAdmin === 'function') {
      await initAdmin();
    } else {
      console.warn('window.initDefaultAdmin não está definido. Verifique core/auth.js.');
    }
    // Seed de perfis — usa PERFIS_DEFAULT e buildDefaultPerms de core/acl.js
    const perfis = await dbAll('perfis_acesso');
    if (perfis.length === 0) {
      for (const p of PERFIS_DEFAULT) {
        await dbPut('perfis_acesso', { ...p, permissoes: buildDefaultPerms() });
      }
    }
    const loginEl = document.getElementById('login');
    if (loginEl && typeof loginEl.focus === 'function') {
      loginEl.focus();
    }
  }).catch(function (err) {
    const loginEl = document.getElementById('login');
    var message = 'Erro ao inicializar o banco de dados.';
    if (err && err.message) message += ' ' + err.message;
    if (loginEl && typeof loginEl.setError === 'function') {
      loginEl.setError(message);
    }
    console.error('initDB failed:', err);
  });
});
</script>
</body>
</html>
